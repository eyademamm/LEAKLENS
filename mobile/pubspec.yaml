name: leaklens
description: LeakLens — Water Leakage Detection Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Local storage
  shared_preferences: ^2.3.1

  # UI / Typography
  google_fonts: ^6.2.1
  animate_do: ^3.3.4

  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.1.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  permission_handler: ^11.3.1
  alarm: ^5.1.5
  flutter_timezone: ^5.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
